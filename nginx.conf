server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Privacy-first: do NOT log visitor IPs. Keeps the Datenschutz
    # "no analytics / no long-term logging" statement honest.
    access_log off;
    error_log /dev/stderr warn;

    # --- Security headers ---
    # nginx's add_header stops inheriting into a location block the moment that
    # block sets its OWN add_header. The cache locations below need Cache-Control,
    # so they MUST re-declare the security headers or those responses ship none.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), browsing-topics=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # script-src strict ('self', no unsafe-inline) — the real fix: site JS is the
    # same-origin /site.js. style-src keeps 'unsafe-inline' for Astro's tiny :root
    # variables block (no real risk on a no-third-party static site).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests" always;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Fingerprinted Astro assets are immutable — cache hard, re-declare headers.
    location /_astro/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), browsing-topics=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests" always;
        add_header Cache-Control "public, immutable" always;
        expires 1y;
        try_files $uri =404;
    }

    # Self-hosted fonts / static media — cache a while, re-declare headers.
    location ~* \.(woff2?|ttf|otf|png|jpg|jpeg|webp|avif|svg|ico)$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), browsing-topics=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests" always;
        add_header Cache-Control "public" always;
        expires 30d;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
}
